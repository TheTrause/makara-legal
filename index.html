<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Makara — Yasal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .links{display:flex;flex-direction:column;gap:14px;margin-top:24px}
  .linkbtn{display:block;background:var(--card);border:1px solid var(--border);
    border-radius:14px;padding:18px 20px;text-align:center;color:var(--cream);
    font-size:15.5px;font-weight:600;letter-spacing:.3px}
  .linkbtn:hover{border-color:var(--emerald);text-decoration:none}
  .linkbtn span{display:block;font-size:12.5px;color:var(--goldDim);
    font-weight:400;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="wordmark">MAK<span class="o">⊙</span>RA</div>
  </div>
  <div class="tagline">Ortak zevkte buluş</div>

  <div class="card">
    <h2 style="margin-top:0">Yasal Belgeler</h2>
    <p>Makara'nın gizlilik ve kullanım koşulları belgeleri aşağıdadır.</p>
    <div class="links">
      <a class="linkbtn" href="privacy.html">Gizlilik Politikası
        <span>Verilerini nasıl işliyoruz</span></a>
      <a class="linkbtn" href="terms.html">Kullanım Koşulları
        <span>Uygulamayı kullanma kuralları</span></a>
    </div>
  </div>

  <footer>Repress Studio · İstanbul, Türkiye</footer>
</div>
</body>
</html>
